worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include       /etc/nginx/mime.types;
	default_type  application/octet-stream;
	sendfile on;
	keepalive_timeout 65;
	server_tokens off;
	client_max_body_size 10M;

	gzip on;
	gzip_types application/json application/javascript text/css text/plain;

	log_format main '$remote_addr $request_method $request_uri $status ${body_bytes_sent}b ${request_time}s';
	access_log /var/log/nginx/access.log main;

	server {
		listen 80 default_server;
		root /app/public;
		index index.php;

		# API + add-in assets
		location / {
			try_files $uri $uri/ /index.php?$query_string;
		}

		# Add-in resources change with every backend deploy; Office
		# WebView2 caches them forever otherwise. no-store forces a
		# fresh fetch every time the task pane re-opens.
		location ~ ^/addin/.+\.(js|html|css)$ {
			add_header Cache-Control "no-store, must-revalidate";
			add_header Pragma "no-cache";
			expires off;
			try_files $uri =404;
		}

		location ~ \.php$ {
			fastcgi_pass 127.0.0.1:9000;
			fastcgi_index index.php;
			include fastcgi_params;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			fastcgi_read_timeout 60;
		}

		# Hide hidden files + config
		location ~ /\. { deny all; }
		location ~ /config/ { deny all; }
	}
}
