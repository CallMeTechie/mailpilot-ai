worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include       /etc/nginx/mime.types;
	default_type  application/octet-stream;
	sendfile on;
	keepalive_timeout 65;
	server_tokens off;
	client_max_body_size 10M;

	gzip on;
	gzip_types application/json application/javascript text/css text/plain;

	log_format main '$remote_addr $request_method $request_uri $status ${body_bytes_sent}b ${request_time}s';
	access_log /var/log/nginx/access.log main;

	server {
		listen 80 default_server;
		root /app/public;
		index index.php;

		# Phase-H4 — Security headers werden BEWUSST nur in location-
		# Bloecken gesetzt, nicht hier im server{} block. Grund:
		# nginx's add_header inherit-Regel verwirft ALLE outer
		# add_header sobald ein location-Block selbst add_header
		# definiert — siehe nginx-Doku ngx_http_headers_module. Doppelt-
		# definierte Header in jedem location sind DRY-Verletzung, aber
		# einzig nginx-korrekte Loesung. `always`-Flag sendet auch fuer
		# 4xx/5xx-Status-Codes.

		# API + add-in assets — strenge default CSP (kein script/iframe).
		location / {
			add_header X-Content-Type-Options "nosniff" always;
			add_header X-Permitted-Cross-Domain-Policies "none" always;
			add_header Referrer-Policy "strict-origin-when-cross-origin" always;
			add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
			add_header X-Frame-Options "DENY" always;
			add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;
			try_files $uri $uri/ /index.php?$query_string;
		}

		# Add-in resources change with every backend deploy; Office
		# WebView2 caches them forever otherwise. no-store forces a
		# fresh fetch every time the task pane re-opens.
		#
		# Phase-H4 hotfix (2026-05-18) — Add-in CSP entfernt:
		#   - Microsoft dokumentiert keine offizielle CSP fuer Office
		#     Add-ins. Office.js macht intern Calls zu undokumentierten
		#     MS-Hosts (Telemetrie, Auth-Refresh, Settings).
		#   - frame-ancestors-Whitelist enthielt vermutlich nicht den
		#     Outlook-Desktop-WebView2-Origin → iframe blockiert.
		#   - connect-src 'self' blockierte Office.js Init-Calls.
		# Die anderen Defense-in-depth-Header (HSTS, nosniff, Referrer-
		# Policy, X-Permitted-Cross-Domain-Policies) bleiben. KEIN
		# X-Frame-Options (Add-in MUSS iframe-bar sein in Outlook).
		# Strikteres CSP kann spaeter mit empirischer Allow-Liste aus
		# DevTools-Console hinzugefuegt werden.
		location ~ ^/addin/.+\.(js|html|css)$ {
			add_header X-Content-Type-Options "nosniff" always;
			add_header X-Permitted-Cross-Domain-Policies "none" always;
			add_header Referrer-Policy "strict-origin-when-cross-origin" always;
			add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
			add_header Cache-Control "no-store, must-revalidate" always;
			add_header Pragma "no-cache" always;
			expires off;
			try_files $uri =404;
		}

		location ~ \.php$ {
			# Phase-H4 fix — try_files in `location /` macht internal rewrite
			# zu /index.php, danach matched dieser PHP-Location-Block. Ohne
			# Wiederholung der Security-Header hier wuerden API-Requests
			# (alles geht durch index.php) keine Header bekommen.
			add_header X-Content-Type-Options "nosniff" always;
			add_header X-Permitted-Cross-Domain-Policies "none" always;
			add_header Referrer-Policy "strict-origin-when-cross-origin" always;
			add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
			add_header X-Frame-Options "DENY" always;
			add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;

			fastcgi_pass 127.0.0.1:9000;
			fastcgi_index index.php;
			include fastcgi_params;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			fastcgi_read_timeout 60;
		}

		# Hide hidden files + config
		location ~ /\. { deny all; }
		location ~ /config/ { deny all; }
	}
}
