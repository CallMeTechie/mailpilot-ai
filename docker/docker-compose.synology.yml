# MailPilot AI — Synology Container Manager (DSM 7.2+) variant.
#
# Use this compose file when deploying via DSM's "Project" feature.
# Differences vs. docker-compose.yml:
#   - No external nginx-proxy network — DSM's Reverse Proxy fronts everything
#   - Backend / admin ports are exposed directly to the host
#   - Schema mount uses a relative path that matches the project directory
#
# Setup (no SSH required — File Station + Container Manager only)
# ---------------------------------------------------------------
# 1) DSM → File Station → create folder /docker/mailpilot-ai
# 2) Create file /docker/mailpilot-ai/.env with the required values.
#    Template: see docker/.env.example in the GitHub repo.
# 3) Upload THIS file (docker-compose.synology.yml) to /docker/mailpilot-ai/.
# 4) DSM → Container Manager → Project → Create:
#       Project name: mailpilot-ai
#       Path:         /docker/mailpilot-ai
#       Source:       Use existing docker-compose.yml
#       File:         docker-compose.synology.yml
#    Container Manager pulls the public images from GHCR — no login needed.
# 5) Set up Reverse Proxy (DSM → Login Portal → Advanced → Reverse Proxy):
#       Source: https://mailpilot.your-host.example   →  http://localhost:${BACKEND_PORT:-18080}
#       Source: https://admin.mailpilot.your-host.example  →  http://localhost:${ADMIN_PORT:-18081}
#
# Schema initialisation is automatic on first start — the 'migrate' service
# applies all backend/migrations/*.sql files, then exits.

services:
  migrate:
    image: ${IMAGE_REGISTRY:-ghcr.io/callmetechie}/mailpilot-ai-backend:${IMAGE_TAG:-latest}
    container_name: mailpilot-migrate
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for MariaDB (root login) ..."
        until php -r 'new PDO("mysql:host=mariadb;dbname=mysql", "root", getenv("DB_ROOT_PASS"));' 2>/dev/null; do
          sleep 2
        done
        echo "Ensuring DB user has wildcard host grant ..."
        php /app/bin/ensure_db_user.php
        echo "Applying migrations ..."
        cd /app && php bin/migrate.php
    environment:
      DB_HOST: mariadb
      DB_NAME: mailpilot
      DB_USER: mailpilot
      DB_PASS: ${DB_PASS}
      DB_ROOT_PASS: ${DB_ROOT_PASS}
      ENCRYPT_KEY: ${ENCRYPT_KEY}
      JWT_SECRET: ${JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      MS_REDIRECT_URI: ${MS_REDIRECT_URI}
    depends_on:
      - mariadb
    networks:
      - mailpilot

  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/callmetechie}/mailpilot-ai-backend:${IMAGE_TAG:-latest}
    container_name: mailpilot-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-18080}:80"
    environment:
      APP_ENV: prod
      APP_DEBUG: "false"
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL must be set in .env}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-mailpilot.ai}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-mailpilot-addin}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://outlook.office.com,https://outlook.office365.com}
      ENCRYPT_KEY: ${ENCRYPT_KEY}
      DB_HOST: mariadb
      DB_NAME: mailpilot
      DB_USER: mailpilot
      DB_PASS: ${DB_PASS}
      REDIS_HOST: redis
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_PROVIDER: ${CLAUDE_PROVIDER:-anthropic}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      MS_CLIENT_ID: ${MS_CLIENT_ID}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET}
      MS_REDIRECT_URI: ${MS_REDIRECT_URI:?MS_REDIRECT_URI must be set in .env}
    volumes:
      - ./var/log:/app/var/log
    networks:
      - mailpilot
    depends_on:
      - mariadb
      - redis
      - migrate

  worker:
    image: ${IMAGE_REGISTRY:-ghcr.io/callmetechie}/mailpilot-ai-backend:${IMAGE_TAG:-latest}
    container_name: mailpilot-worker
    restart: unless-stopped
    command: ["php", "/app/bin/worker.php"]
    environment:
      APP_ENV: prod
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL must be set in .env}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-mailpilot.ai}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-mailpilot-addin}
      DB_HOST: mariadb
      DB_NAME: mailpilot
      DB_USER: mailpilot
      DB_PASS: ${DB_PASS}
      REDIS_HOST: redis
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_PROVIDER: ${CLAUDE_PROVIDER:-anthropic}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      ENCRYPT_KEY: ${ENCRYPT_KEY}
      MS_CLIENT_ID: ${MS_CLIENT_ID}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET}
    volumes:
      - ./var/log:/app/var/log
    networks:
      - mailpilot
    depends_on:
      - mariadb
      - redis

  admin:
    image: ${IMAGE_REGISTRY:-ghcr.io/callmetechie}/mailpilot-ai-admin:${IMAGE_TAG:-latest}
    container_name: mailpilot-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-18081}:80"
    environment:
      APP_ENV: prod
      DB_HOST: mariadb
      DB_NAME: mailpilot
      DB_USER: mailpilot
      DB_PASS: ${DB_PASS}
      REDIS_HOST: redis
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASS_HASH: ${ADMIN_PASS_HASH}
      ADMIN_IP_RESTRICT: ${ADMIN_IP_RESTRICT:-false}
      ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS:-}
      ENCRYPT_KEY: ${ENCRYPT_KEY}
    networks:
      - mailpilot
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11.4
    container_name: mailpilot-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: mailpilot
      MARIADB_USER: mailpilot
      MARIADB_PASSWORD: ${DB_PASS}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mailpilot-db:/var/lib/mysql
    networks:
      - mailpilot

  redis:
    image: redis:7-alpine
    container_name: mailpilot-redis
    restart: unless-stopped
    volumes:
      - mailpilot-redis:/data
    networks:
      - mailpilot

networks:
  mailpilot:
    driver: bridge

volumes:
  mailpilot-db:
  mailpilot-redis:
