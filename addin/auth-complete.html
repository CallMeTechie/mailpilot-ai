<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<title>MailPilot — Anmeldung abgeschlossen</title>
	<link rel="stylesheet" href="src/taskpane.css">
	<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
	<main class="mp-main" style="text-align:center; padding:60px 20px;">
		<h1>✓ Angemeldet</h1>
		<p class="mp-muted" id="status">Fenster wird automatisch geschlossen…</p>
	</main>

	<script>
		// Token arrives in URL fragment — never logged, never sent to server.
		const fragment = window.location.hash.substring(1);
		const params = new URLSearchParams(fragment);
		const token = params.get('token');

		if (token) {
			// Backup-Pfade für den Token-Handoff, falls die taskpane via
			// localStorage-Storage-Event statt /auth/oauth/exchange handelt.
			try { localStorage.setItem('mp_jwt', token); } catch (e) { /* ignore */ }
			try {
				localStorage.setItem('mp_jwt_handoff', JSON.stringify({ token: token, ts: Date.now() }));
			} catch (e) { /* ignore */ }
			if (window.opener && !window.opener.closed) {
				try {
					window.opener.postMessage({ type: 'mp-auth-complete', token: token }, window.location.origin);
				} catch (e) { /* ignore */ }
			}

			// Browser allows window.close() on script-opened popups (we were
			// opened via window.open in the taskpane). Brief delay so the
			// user sees the success message; then close.
			setTimeout(function () { try { window.close(); } catch (e) { /* ignore */ } }, 500);
		} else {
			document.getElementById('status').textContent = 'Anmeldung fehlgeschlagen.';
		}
	</script>
</body>
</html>
