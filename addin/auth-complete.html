<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<title>MailPilot — Anmeldung abgeschlossen</title>
	<link rel="stylesheet" href="src/taskpane.css">
	<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
	<main class="mp-main" style="text-align:center; padding:60px 20px;">
		<h1>✓ Angemeldet</h1>
		<p class="mp-muted" id="status">Anmeldung wird verarbeitet…</p>
	</main>

	<script>
		// Token arrives in URL fragment — never logged, never sent to server
		const fragment = window.location.hash.substring(1);
		const params = new URLSearchParams(fragment);
		const token = params.get('token');

		if (token) {
			document.getElementById('status').textContent = 'Du kannst dieses Fenster schließen. MailPilot ist jetzt aktiv.';

			// Try every handoff path simultaneously — whichever one the host
			// actually delivers wins; the others become no-ops because the
			// taskpane only acts on the first valid token it sees.

			// Path 1 — direct localStorage in same origin: the taskpane reads
			// it on Office.onReady AND on DialogEventReceived, so even
			// storage-partitioned dialogs that share the underlying origin
			// can pick this up after the dialog closes.
			try { localStorage.setItem('mp_jwt', token); } catch (e) { /* ignore */ }

			// Path 2 — handoff slot, fires the `storage` event in other tabs
			// of the same origin (works when dialog runs as a real popup).
			try {
				localStorage.setItem('mp_jwt_handoff', JSON.stringify({ token: token, ts: Date.now() }));
			} catch (e) { /* ignore */ }

			// Path 3 — Office Dialog API messageParent (cleanest when the
			// dialog runs inside Office's managed iframe).
			try {
				if (typeof Office !== 'undefined' && Office.context && Office.context.ui && typeof Office.context.ui.messageParent === 'function') {
					Office.onReady(function () {
						try {
							Office.context.ui.messageParent(JSON.stringify({ type: 'mp-auth-complete', token: token }));
						} catch (e) { /* ignore */ }
					});
				}
			} catch (e) { /* ignore */ }

			// Path 4 — postMessage to window.opener (legacy popup flow,
			// often killed by Cross-Origin-Opener-Policy but free to try).
			if (window.opener && !window.opener.closed) {
				try {
					window.opener.postMessage({ type: 'mp-auth-complete', token: token }, window.location.origin);
				} catch (e) { /* ignore */ }
			}

			setTimeout(function () { try { window.close(); } catch (e) { /* ignore */ } }, 1500);
		} else {
			document.getElementById('status').textContent = 'Anmeldung fehlgeschlagen.';
		}
	</script>
</body>
</html>
